name: Wallet UI Manual

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  noop:
    if: ${{ github.event_name == 'push' }}
    runs-on: ubuntu-latest
    steps:
      - name: Skip wallet UI on push
        run: echo "Wallet UI workflow is manual-only; push event acknowledged."

  wallet-ui:
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Validate NEO_TEST_WIF secret
        env:
          NEO_TEST_WIF: ${{ secrets.NEO_TEST_WIF }}
        run: |
          if [ -z "$NEO_TEST_WIF" ]; then
            echo "Missing NEO_TEST_WIF secret"
            exit 1
          fi

      - name: Run Wallet UI Regression
        env:
          NEO_TEST_WIF: ${{ secrets.NEO_TEST_WIF }}
        run: npm run test:wif-ui
