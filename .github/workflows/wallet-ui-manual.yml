name: Wallet UI Manual

on:
  workflow_dispatch:

jobs:
  wallet-ui:
    if: ${{ secrets.NEO_TEST_WIF != '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run Wallet UI Regression
        env:
          NEO_TEST_WIF: ${{ secrets.NEO_TEST_WIF }}
        run: npm run test:wif-ui
