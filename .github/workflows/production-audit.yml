name: Production Audit

on:
  workflow_dispatch:
    inputs:
      run_wallet_ui:
        description: Run real wallet UI regression with NEO_TEST_WIF secret
        required: false
        default: false
        type: boolean

jobs:
  audit-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Audit Production Config
        run: npm run audit:production-config

      - name: Typecheck
        run: npm run check

      - name: Build
        run: npm run build

      - name: Smoke E2E
        run: npm run smoke:e2e

      - name: Smoke Trade
        run: npm run smoke:trade

  wallet-ui:
    if: ${{ inputs.run_wallet_ui && secrets.NEO_TEST_WIF != '' }}
    needs: audit-and-build
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run Wallet UI Regression
        env:
          NEO_TEST_WIF: ${{ secrets.NEO_TEST_WIF }}
        run: npm run test:wif-ui
