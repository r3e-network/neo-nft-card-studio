name: Production Audit

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  audit-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Audit Production Config
        run: npm run audit:production-config

      - name: Audit Security Surface
        run: npm run audit:security

      - name: Audit Runtime Contracts
        run: npm run audit:runtime-contracts

      - name: Typecheck
        run: npm run check

      - name: Build
        run: npm run build

      - name: Smoke E2E
        env:
          CI_SKIP_CONTRACT_VERIFY: "true"
        run: npm run smoke:e2e

      - name: Smoke Trade
        run: npm run smoke:trade
